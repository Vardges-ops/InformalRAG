[QDRANT]

# Qdrant service URL

url = http://localhost:6333

# Collection name used for vector storage

collection_name = wiki_chunks

[MODELS]

# Embedding model name (SentenceTransformers)

embedding_model = all-MiniLM-L6-v2

# Path to locally cloned reranker model

# IMPORTANT: Must be updated by user

# Example (Windows):

# reranker_path = C:\path\to\ms-marco-MiniLM-L-6-v2

reranker_path = YOUR_LOCAL_PATH_HERE

[CACHE]

# Maximum number of cached queries

cache_max_size = 100

# Cache expiration in seconds

cache_expiration_seconds = 3600

[LLM]

# Ollama or LLM endpoint

url = http://localhost:11434/api/generate

# Model name (must be pulled via Ollama)

model_name = gemma:2b

# Generation parameters

temperature = 0.7
top_p = 0.9
top_k = 40
repetition_penalty = 1.1
num_predict = 250

[LOGGING]

# Logging level: DEBUG, INFO, WARNING, ERROR

log_level = INFO

# Logging format (do NOT modify unless needed)

log_format = %(asctime)s - %(name)s - %(levelname)s - %(message)s
